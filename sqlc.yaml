version: "2"
sql:
  - engine: "postgresql"
    queries: "./internal/sqlc/queries"
    schema: "./internal/sqlc/schema.sql"
    gen:
      go:
        package: "sqlc"
        out: "./internal/sqlc"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamp"
            go_type: "time.Time"
          - db_type: "timestamptz"
            go_type: "time.Time"
